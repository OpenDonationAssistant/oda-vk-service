datasources:
  default:
    url: ${JDBC_URL:`jdbc:postgresql://localhost/postgres`}
    username: ${JDBC_USER:`postgres`}
    password: ${JDBC_PASSWORD:`postgres`}
    driverClassName: 'org.postgresql.Driver'
    maximumPoolSize: 1
    schema: vk
logger:
  levels:
    io.github.opendonationassistant: INFO
